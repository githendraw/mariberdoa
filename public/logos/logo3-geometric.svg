<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5A0"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <linearGradient id="tealDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2B2B"/>
      <stop offset="100%" style="stop-color:#134E4A"/>
    </linearGradient>
    <linearGradient id="cream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EDE5"/>
      <stop offset="100%" style="stop-color:#FDFBF7"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#tealDark)"/>

  <!-- Outer geometric ring - octagram star pattern -->
  <g transform="translate(200,200)" opacity="0.08">
    <polygon points="0,-150 106,-106 150,0 106,106 0,150 -106,106 -150,0 -106,-106" fill="none" stroke="#14B8A6" stroke-width="2"/>
    <polygon points="0,-130 92,-92 130,0 92,92 0,130 -92,92 -130,0 -92,-92" fill="none" stroke="#14B8A6" stroke-width="1.5"/>
  </g>

  <!-- 8-pointed star (Rub el Hizb) - main icon -->
  <g transform="translate(200, 155)">
    <!-- Outer diamond -->
    <polygon points="0,-70 70,0 0,70 -70,0" fill="url(#teal)" opacity="0.9"/>
    <!-- Inner diamond (rotated) -->
    <polygon points="0,-50 50,0 0,50 -50,0" fill="#0F2B2B"/>
    <!-- Thin cross creating the Rub el Hizb -->
    <rect x="-55" y="-3" width="110" height="6" rx="3" fill="url(#teal)"/>
    <rect x="-3" y="-55" width="6" height="110" rx="3" fill="url(#teal)"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="10" fill="url(#teal)"/>
    <!-- Small inner circle -->
    <circle cx="0" cy="0" r="5" fill="#0F2B2B"/>
  </g>

  <!-- Small decorative dots around -->
  <circle cx="200" cy="70" r="3" fill="#14B8A6" opacity="0.5"/>
  <circle cx="135" cy="95" r="2" fill="#14B8A6" opacity="0.3"/>
  <circle cx="265" cy="95" r="2" fill="#14B8A6" opacity="0.3"/>
  <circle cx="165" cy="80" r="2" fill="#14B8A6" opacity="0.4"/>
  <circle cx="235" cy="80" r="2" fill="#14B8A6" opacity="0.4"/>

  <!-- Crescent moon inside the star? No, let's add it above -->
  <!-- Crescent -->
  <circle cx="200" cy="70" r="18" fill="url(#teal)"/>
  <circle cx="206" cy="66" r="14" fill="url(#tealDark)"/>

  <!-- Arabic: Mari Berdoa -->
  <text x="200" y="270" font-family="Traditional Arabic, Scheherazade, serif" font-size="30" fill="#14B8A6" text-anchor="middle">ماري بردو</text>

  <!-- English text -->
  <text x="200" y="305" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#FDFBF7" text-anchor="middle" letter-spacing="7">MARI BERDOA</text>

  <!-- Minimal divider -->
  <line x1="140" y1="320" x2="260" y2="320" stroke="#14B8A6" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="200" y="345" font-family="Arial, serif" font-size="10" fill="#14B8A6" text-anchor="middle" opacity="0.6" letter-spacing="5">SETIAP LANGKAH DIMULAI DENGAN DOA</text>

  <!-- Bottom geometric dots -->
  <circle cx="200" cy="365" r="2" fill="#14B8A6" opacity="0.3"/>
</svg>
