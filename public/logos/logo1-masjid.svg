<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#E8D48B"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D4F3C"/>
      <stop offset="100%" style="stop-color:#1A7A5A"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D3B2E"/>
      <stop offset="100%" style="stop-color:#1A7A5A"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#gold)" stroke-width="1.5"/>

  <!-- Crescent Moon -->
  <circle cx="140" cy="100" r="45" fill="url(#gold)"/>
  <circle cx="155" cy="92" r="38" fill="url(#bg)"/>

  <!-- Star -->
  <polygon points="125,90 129,100 140,100 131,106 134,117 125,111 116,117 119,106 110,100 121,100" fill="url(#gold)"/>

  <!-- Masjid Dome -->
  <path d="M120 220 Q120 140 200 130 Q280 140 280 220 Z" fill="url(#gold)" opacity="0.9"/>
  <path d="M140 220 Q140 160 200 150 Q260 160 260 220 Z" fill="#0D4F3C"/>

  <!-- Dome detail -->
  <path d="M200 150 L200 220" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- Minarets -->
  <rect x="95" y="170" width="12" height="65" rx="3" fill="url(#gold)"/>
  <polygon points="101,165 95,175 107,175" fill="url(#gold)"/>
  <rect x="293" y="170" width="12" height="65" rx="3" fill="url(#gold)"/>
  <polygon points="299,165 293,175 305,175" fill="url(#gold)"/>

  <!-- Masjid base -->
  <rect x="115" y="220" width="170" height="8" rx="2" fill="url(#gold)"/>

  <!-- Door -->
  <path d="M180 250 Q180 235 200 235 Q220 235 220 250 L220 280 L180 280 Z" fill="#0D3B2E"/>
  <path d="M180 250 Q180 235 200 235 Q220 235 220 250 L220 280 L180 280 Z" fill="none" stroke="url(#gold)" stroke-width="1.5"/>

  <!-- Text background bar -->
  <rect x="50" y="295" width="300" height="55" rx="27" fill="#0D3B2E" stroke="url(#gold)" stroke-width="1"/>

  <!-- Text: MARI BERDOA -->
  <text x="200" y="332" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="6">MARI BERDOA</text>

  <!-- Subtitle -->
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="11" fill="#E8D48B" text-anchor="middle" opacity="0.8" letter-spacing="8">BERDOA SEBELUM BERAKTIVITAS</text>

  <!-- Border ornament -->
  <circle cx="200" cy="385" r="3" fill="url(#gold)" opacity="0.5"/>
  <circle cx="185" cy="385" r="2" fill="url(#gold)" opacity="0.3"/>
  <circle cx="215" cy="385" r="2" fill="url(#gold)" opacity="0.3"/>
</svg>
