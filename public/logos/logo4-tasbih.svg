<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A2E3B"/>
      <stop offset="100%" style="stop-color:#A8444F"/>
    </linearGradient>
    <linearGradient id="roseGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#F0D68A"/>
    </linearGradient>
    <linearGradient id="creamBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8"/>
      <stop offset="100%" style="stop-color:#FAF6F0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#creamBg)"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#rose)" stroke-width="1" opacity="0.15"/>

  <!-- Tasbih / Prayer beads circle -->
  <g transform="translate(200, 150)">
    <!-- Beads circle path -->
    <g opacity="0.08">
      <circle cx="0" cy="-65" r="8" fill="url(#rose)"/>
      <circle cx="46" cy="-46" r="8" fill="url(#rose)"/>
      <circle cx="65" cy="0" r="8" fill="url(#rose)"/>
      <circle cx="46" cy="46" r="8" fill="url(#rose)"/>
      <circle cx="0" cy="65" r="8" fill="url(#rose)"/>
      <circle cx="-46" cy="46" r="8" fill="url(#rose)"/>
      <circle cx="-65" cy="0" r="8" fill="url(#rose)"/>
      <circle cx="-46" cy="-46" r="8" fill="url(#rose)"/>
    </g>

    <!-- Main beads -->
    <circle cx="0" cy="-55" r="6" fill="url(#roseGold)" opacity="0.9"/>
    <circle cx="39" cy="-39" r="6" fill="url(#roseGold)" opacity="0.8"/>
    <circle cx="55" cy="0" r="6" fill="url(#roseGold)" opacity="0.9"/>
    <circle cx="39" cy="39" r="6" fill="url(#roseGold)" opacity="0.8"/>
    <circle cx="0" cy="55" r="6" fill="url(#roseGold)" opacity="0.9"/>
    <circle cx="-39" cy="39" r="6" fill="url(#roseGold)" opacity="0.8"/>
    <circle cx="-55" cy="0" r="6" fill="url(#roseGold)" opacity="0.9"/>
    <circle cx="-39" cy="-39" r="6" fill="url(#roseGold)" opacity="0.8"/>

    <!-- Bead connector lines -->
    <circle cx="0" cy="0" r="3" fill="url(#roseGold)" opacity="0.3"/>
  </g>

  <!-- In the center of beads: Crescent + Star -->
  <circle cx="200" cy="150" r="16" fill="url(#roseGold)"/>
  <circle cx="205" cy="146" r="13" fill="url(#creamBg)"/>
  <!-- Star inside crescent -->
  <polygon points="200,131 202.5,139 211,139 204,144 206.5,152 200,147 193.5,152 196,144 189,139 197.5,139" fill="url(#roseGold)"/>

  <!-- Arabic text -->
  <text x="200" y="245" font-family="Traditional Arabic, Scheherazade, serif" font-size="32" fill="url(#rose)" text-anchor="middle">ماري بردو</text>

  <!-- Main title -->
  <text x="200" y="285" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#7A2E3B" text-anchor="middle" letter-spacing="6">MARI BERDOA</text>

  <!-- Ornamental divider -->
  <g transform="translate(200, 305)" opacity="0.4">
    <line x1="-70" y1="0" x2="-20" y2="0" stroke="#7A2E3B" stroke-width="1"/>
    <circle cx="-10" cy="0" r="2" fill="url(#roseGold)"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#7A2E3B" stroke-width="0.5"/>
    <circle cx="10" cy="0" r="2" fill="url(#roseGold)"/>
    <line x1="14" y1="0" x2="70" y2="0" stroke="#7A2E3B" stroke-width="1"/>
  </g>

  <!-- Subtitle -->
  <text x="200" y="335" font-family="Georgia, serif" font-size="11" fill="#7A2E3B" text-anchor="middle" opacity="0.5" font-style="italic" letter-spacing="3">Doa Harian Untuk Umat Islam</text>

  <!-- Bottom ornament -->
  <g transform="translate(200, 360)" opacity="0.15">
    <path d="M-30 0 Q-15 -15 0 0 Q15 -15 30 0" fill="none" stroke="#7A2E3B" stroke-width="1.5"/>
  </g>
</svg>
