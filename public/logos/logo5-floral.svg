<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E3A"/>
      <stop offset="100%" style="stop-color:#2D8A5C"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#6EE7B7"/>
    </linearGradient>
    <linearGradient id="darkGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2E1A"/>
      <stop offset="100%" style="stop-color:#145232"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#darkGreen)"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#34D399" stroke-width="0.8" opacity="0.3"/>

  <!-- Islamic floral / arabesque pattern background -->
  <g transform="translate(200,200)" opacity="0.04">
    <path d="M0,-140 C30,-130 60,-100 70,-70 C80,-40 50,-20 30,0 C10,20 40,50 30,80 C20,110 -10,120 -30,130 C-50,140 -80,130 -90,100 C-100,70 -80,40 -60,20 C-40,0 -60,-30 -50,-60 C-40,-90 -20,-130 0,-140Z" fill="#34D399"/>
    <path d="M0,-140 C-30,-130 -60,-100 -70,-70 C-80,-40 -50,-20 -30,0 C-10,20 -40,50 -30,80 C-20,110 10,120 30,130 C50,140 80,130 90,100 C100,70 80,40 60,20 C40,0 60,-30 50,-60 C40,-90 20,-130 0,-140Z" fill="#6EE7B7"/>
  </g>

  <!-- Floral / Leaf ornament around the icon -->
  <g transform="translate(200, 155)" opacity="0.1">
    <!-- Left leaf -->
    <path d="M0,0 C-15,-10 -35,-5 -40,10 C-45,25 -30,35 -20,30 C-10,25 -5,10 0,0Z" fill="#6EE7B7"/>
    <!-- Right leaf -->
    <path d="M0,0 C15,-10 35,-5 40,10 C45,25 30,35 20,30 C10,25 5,10 0,0Z" fill="#6EE7B7"/>
  </g>

  <!-- Main icon: Simple mosque silhouette with dome -->
  <g transform="translate(200, 145)">
    <!-- Dome -->
    <path d="M-35 15 Q-35 -35 0 -45 Q35 -35 35 15 Z" fill="#34D399"/>
    <!-- Dome stripe -->
    <path d="M-28 5 L-28 -15" stroke="#0A2E1A" stroke-width="2.5"/>
    <path d="M-22 10 L-22 -28" stroke="#0A2E1A" stroke-width="2.5"/>
    <path d="M-15 12 L-15 -35" stroke="#0A2E1A" stroke-width="2.5"/>
    <path d="M-7 14 L-7 -40" stroke="#0A2E1A" stroke-width="2.5"/>
    <path d="M0 15 L0 -42" stroke="#0A2E1A" stroke-width="3"/>
    <path d="M7 14 L7 -40" stroke="#0A2E1A" stroke-width="2.5"/>
    <path d="M15 12 L15 -35" stroke="#0A2E1A" stroke-width="2.5"/>
    <path d="M22 10 L22 -28" stroke="#0A2E1A" stroke-width="2.5"/>
    <path d="M28 5 L28 -15" stroke="#0A2E1A" stroke-width="2.5"/>

    <!-- Minarets -->
    <rect x="-48" y="-10" width="8" height="35" rx="2" fill="#34D399"/>
    <polygon points="-44,-15 -52,-5 -36,-5" fill="#34D399"/>
    <rect x="40" y="-10" width="8" height="35" rx="2" fill="#34D399"/>
    <polygon points="44,-15 36,-5 52,-5" fill="#34D399"/>

    <!-- Base -->
    <rect x="-35" y="12" width="70" height="6" rx="2" fill="#34D399"/>
  </g>

  <!-- Crescent -->
  <circle cx="220" cy="105" r="14" fill="#34D399"/>
  <circle cx="224" cy="102" r="11" fill="url(#darkGreen)"/>

  <!-- Stars -->
  <polygon points="160,125 162,130 168,130 163,134 165,140 160,136 155,140 157,134 152,130 158,130" fill="#34D399" opacity="0.6"/>
  <polygon points="240,130 241,133 245,133 242,136 243,140 240,138 237,140 238,136 235,133 239,133" fill="#34D399" opacity="0.4"/>

  <!-- Arabic text with calligraphy style -->
  <text x="200" y="248" font-family="Traditional Arabic, Scheherazade, serif" font-size="34" fill="#6EE7B7" text-anchor="middle">ماري بردو</text>

  <!-- Main title -->
  <text x="200" y="288" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#FDFBF7" text-anchor="middle" letter-spacing="7">MARI BERDOA</text>

  <!-- Divider with arabesque style -->
  <g transform="translate(200, 310)" opacity="0.3">
    <line x1="-60" y1="0" x2="-15" y2="0" stroke="#34D399" stroke-width="1"/>
    <path d="M-10,-4 Q0,-8 10,-4" fill="none" stroke="#34D399" stroke-width="1.5"/>
    <line x1="15" y1="0" x2="60" y2="0" stroke="#34D399" stroke-width="1"/>
  </g>

  <!-- Tagline -->
  <text x="200" y="340" font-family="Georgia, serif" font-size="11" fill="#34D399" text-anchor="middle" opacity="0.6" letter-spacing="4" font-style="italic">Doa Pagi &amp; Petang</text>

  <!-- Bottom leaf ornaments -->
  <g transform="translate(200, 365)" opacity="0.15">
    <path d="M-20,-5 C-15,-12 -5,-12 0,-5 C5,-12 15,-12 20,-5" fill="none" stroke="#6EE7B7" stroke-width="1.2"/>
  </g>
</svg>
